<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NCSS-IQ — National Credit Scoring System for Iraq</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
  /* ─── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    font-family: 'Inter', sans-serif;
    background: #040c1a;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }

  /* ─── Layout ────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* ─── Top Bar ────────────────────────────────────────── */
  #topbar {
    flex-shrink: 0;
    height: 52px;
    background: #0a1628;
    border-bottom: 1px solid #1e2d45;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 100;
  }
  #topbar .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .brand-icon {
    width: 32px; height: 32px;
    background: #ca8a04;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }
  #topbar .brand-text {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #e5e7eb;
  }
  #topbar .brand-sub {
    font-size: 10px;
    color: #6b7280;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  #topbar .controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .counter {
    font-size: 12px;
    color: #9ca3af;
    letter-spacing: .04em;
    min-width: 60px;
    text-align: center;
  }
  .ctrl-btn {
    width: 32px; height: 32px;
    background: #1e2d45;
    border: 1px solid #2d3f57;
    border-radius: 6px;
    color: #d1d5db;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s, border-color .15s;
  }
  .ctrl-btn:hover { background: #ca8a04; border-color: #ca8a04; color: #fff; }
  .ctrl-btn:disabled { opacity: .35; cursor: default; }
  .ctrl-btn:disabled:hover { background: #1e2d45; border-color: #2d3f57; color: #d1d5db; }

  /* fullscreen toggle */
  #btn-fs { margin-left: 8px; background: #111e35; border-color: #1e2d45; }

  /* progress bar */
  #progress-track {
    position: relative;
    width: 160px; height: 4px;
    background: #1e2d45;
    border-radius: 4px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: #ca8a04;
    border-radius: 4px;
    transition: width .3s ease;
  }

  /* ─── Main Area ─────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ─── Thumbnail Panel ───────────────────────────────── */
  #panel {
    width: 210px;
    flex-shrink: 0;
    background: #07101f;
    border-right: 1px solid #1e2d45;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 4px; }

  .thumb-item {
    position: relative;
    flex-shrink: 0;
    border-radius: 6px;
    border: 1.5px solid #1e2d45;
    overflow: hidden;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    background: #0f172a;
  }
  .thumb-item:hover { border-color: #ca8a04; }
  .thumb-item.active {
    border-color: #ca8a04;
    box-shadow: 0 0 0 2px rgba(202,138,4,.25);
  }
  .thumb-item .thumb-inner {
    width: 193px;
    height: 109px;          /* 16:9 at 193px width */
    position: relative;
    overflow: hidden;
    pointer-events: none;
  }
  .thumb-item iframe {
    width: 1280px;
    height: 720px;
    border: none;
    transform-origin: top left;
    transform: scale(0.1508);   /* 193/1280 */
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  .thumb-item .thumb-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
  }
  .thumb-item .thumb-label {
    padding: 4px 7px 5px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: #070f1e;
    border-top: 1px solid #1e2d45;
  }
  .thumb-item.active .thumb-label { background: #0e1a2f; }
  .thumb-num {
    width: 18px; height: 18px;
    border-radius: 4px;
    background: #1e2d45;
    font-size: 9px;
    font-weight: 700;
    color: #9ca3af;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .thumb-item.active .thumb-num { background: #92400e; color: #fde68a; }
  .thumb-title {
    font-size: 9.5px;
    font-weight: 500;
    color: #9ca3af;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    letter-spacing: .02em;
  }
  .thumb-item.active .thumb-title { color: #fde68a; }

  /* ─── Slide Stage ────────────────────────────────────── */
  #stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #040c1a;
    position: relative;
    overflow: hidden;
  }

  /* slide wrapper keeps 16:9 and scales to fit stage */
  #slide-wrapper {
    position: relative;
    background: #0f172a;
    box-shadow: 0 0 60px rgba(0,0,0,.7), 0 0 0 1px #1e2d45;
  }
  #slide-wrapper iframe {
    display: block;
    width: 1280px;
    height: 720px;
    border: none;
    transform-origin: top left;
  }

  /* slide transition animations */
  #slide-wrapper {
    transition: opacity .2s ease;
    will-change: transform, opacity, filter;
  }
  #slide-wrapper.trans-out-left  { animation: slideOutLeft .24s cubic-bezier(.4,0,.2,1) forwards; }
  #slide-wrapper.trans-out-right { animation: slideOutRight .24s cubic-bezier(.4,0,.2,1) forwards; }
  #slide-wrapper.trans-in-left   { animation: slideInLeft .28s cubic-bezier(.22,1,.36,1) forwards; }
  #slide-wrapper.trans-in-right  { animation: slideInRight .28s cubic-bezier(.22,1,.36,1) forwards; }

  @keyframes slideOutLeft {
    from { opacity: 1; transform: scale(var(--stage-scale, 1)) translateX(0); filter: blur(0); }
    to   { opacity: 0; transform: scale(var(--stage-scale, 1)) translateX(-48px); filter: blur(1.5px); }
  }
  @keyframes slideOutRight {
    from { opacity: 1; transform: scale(var(--stage-scale, 1)) translateX(0); filter: blur(0); }
    to   { opacity: 0; transform: scale(var(--stage-scale, 1)) translateX(48px); filter: blur(1.5px); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: scale(var(--stage-scale, 1)) translateX(54px); filter: blur(1.5px); }
    to   { opacity: 1; transform: scale(var(--stage-scale, 1)) translateX(0); filter: blur(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: scale(var(--stage-scale, 1)) translateX(-54px); filter: blur(1.5px); }
    to   { opacity: 1; transform: scale(var(--stage-scale, 1)) translateX(0); filter: blur(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    #slide-wrapper,
    #slide-wrapper.trans-out-left,
    #slide-wrapper.trans-out-right,
    #slide-wrapper.trans-in-left,
    #slide-wrapper.trans-in-right {
      animation: none !important;
      transition: none !important;
    }
  }

  /* ─── Arrow Nav ─────────────────────────────────────── */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 42px; height: 42px;
    background: rgba(10,22,40,.75);
    border: 1px solid #1e2d45;
    border-radius: 50%;
    font-size: 16px;
    color: #d1d5db;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 20;
    transition: background .15s, color .15s, border-color .15s, transform .15s;
    backdrop-filter: blur(4px);
  }
  .nav-arrow:hover { background: #ca8a04; border-color: #ca8a04; color: #fff; transform: translateY(-50%) scale(1.08); }
  .nav-arrow:disabled { opacity: .2; cursor: default; pointer-events: none; }
  #btn-prev { left: 14px; }
  #btn-next { right: 14px; }

  /* ─── Bottom Bar ─────────────────────────────────────── */
  #bottombar {
    flex-shrink: 0;
    height: 38px;
    background: #0a1628;
    border-top: 1px solid #1e2d45;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 16px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  #bottombar::-webkit-scrollbar { height: 3px; }
  #bottombar::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #1e2d45;
    cursor: pointer;
    transition: background .15s, transform .15s;
    flex-shrink: 0;
  }
  .dot:hover { background: #6b7280; transform: scale(1.3); }
  .dot.active { background: #ca8a04; transform: scale(1.3); }
  .dot-sep { width: 1px; height: 12px; background: #1e2d45; margin: 0 4px; flex-shrink: 0; }

  /* ─── Panel Toggle ───────────────────────────────────── */
  #panel-toggle {
    position: absolute;
    left: 210px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 40px;
    background: #0e1a2f;
    border: 1px solid #1e2d45;
    border-left: none;
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    transition: left .25s ease, background .15s;
    color: #6b7280;
    font-size: 10px;
  }
  #panel-toggle:hover { background: #1e2d45; color: #d1d5db; }
  body.panel-hidden #panel { width: 0; padding: 0; overflow: hidden; }
  body.panel-hidden #panel-toggle { left: 0; }

  /* ─── Slide counter badge (stage) ───────────────────── */
  #stage-badge {
    position: absolute;
    bottom: 12px;
    right: 14px;
    background: rgba(10,22,40,.8);
    border: 1px solid #1e2d45;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: #9ca3af;
    letter-spacing: .04em;
    pointer-events: none;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  #stage-badge span { color: #fbbf24; font-weight: 600; }

  /* ─── Keyboard hint ─────────────────────────────────── */
  #kbd-hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
    pointer-events: none;
    opacity: .55;
  }
  .kbd { font-size: 9.5px; color: #6b7280; display: flex; align-items: center; gap: 4px; }
  .kbd kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 16px; padding: 0 4px;
    background: #1e2d45; border-radius: 3px;
    font-size: 9px; font-family: inherit; color: #9ca3af;
  }

  /* ─── Mobile slide-list button (topbar) ──────────────── */
  #btn-slides {
    display: none;
    width: 36px; height: 36px;
    background: #1e2d45;
    border: 1px solid #2d3f57;
    border-radius: 6px;
    color: #d1d5db;
    font-size: 13px;
    cursor: pointer;
    align-items: center; justify-content: center;
    transition: background .15s, color .15s;
    flex-shrink: 0;
  }
  #btn-slides:hover { background: #ca8a04; border-color: #ca8a04; color: #fff; }

  /* ─── Panel backdrop (mobile overlay) ───────────────── */
  #panel-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 40;
    backdrop-filter: blur(2px);
  }
  body.panel-overlay #panel-backdrop { display: block; }
  body.panel-overlay #panel {
    position: fixed;
    top: 52px; left: 0;
    height: calc(100% - 52px);
    width: 220px !important;
    padding: 12px 8px !important;
    overflow-y: auto !important;
    overflow-x: hidden !important;
    z-index: 45;
    display: flex !important;
  }
  body.panel-overlay #panel-toggle { display: none; }

  /* ─── Responsive: Tablet ≤ 900px ─────────────────────── */
  @media (max-width: 900px) {
    #panel { width: 180px; }
    .thumb-item .thumb-inner { width: 163px; height: 92px; }
    .thumb-item iframe { width: 1280px; height: 720px; transform: scale(0.1273); }
    #panel-toggle { left: 180px; }
    body.panel-hidden #panel-toggle { left: 0; }
  }

  /* ─── Responsive: Mobile ≤ 768px ─────────────────────── */
  @media (max-width: 768px) {
    /* Topbar */
    #topbar { height: 48px; padding: 0 10px; gap: 6px; }
    #topbar .brand-sub { display: none; }
    #progress-track { display: none; }
    #btn-first, #btn-last { display: none; }
    #slide-counter { min-width: 40px; font-size: 11px; }
    .ctrl-btn { width: 34px; height: 34px; font-size: 12px; }
    #btn-slides { display: flex; }

    /* Panel: hide the side tab, use overlay mode instead */
    #panel-toggle { display: none; }
    #panel { display: none; width: 0; padding: 0; }
    body.panel-overlay #panel { top: 48px; height: calc(100% - 48px); }

    /* Stage arrows: bigger touch targets, tighter positioning */
    .nav-arrow { width: 40px; height: 40px; font-size: 14px; }
    #btn-prev { left: 4px; }
    #btn-next { right: 4px; }

    /* Hide keyboard hint on touch */
    #kbd-hint { display: none; }

    /* Stage badge */
    #stage-badge { font-size: 10px; padding: 2px 8px; bottom: 48px; right: 8px; }

    /* Bottom bar: bigger dots for touch */
    #bottombar { height: 40px; gap: 6px; }
    .dot { width: 10px; height: 10px; }
    .dot-sep { margin: 0 6px; }
  }

  /* ─── Responsive: Small phone ≤ 480px ────────────────── */
  @media (max-width: 480px) {
    #topbar { padding: 0 8px; gap: 4px; }
    #topbar .brand-text { font-size: 11px; letter-spacing: .05em; }
    .ctrl-btn { width: 32px; height: 32px; }
    #btn-prev2, #btn-next2 { display: none; } /* only stage arrows on tiny screens */
    #slide-counter { font-size: 11px; min-width: 36px; }
    .nav-arrow { width: 36px; height: 36px; }
    #stage-badge { bottom: 44px; }
    #bottombar { height: 36px; padding: 0 8px; }
    .dot { width: 8px; height: 8px; }
  }

  /* ─── Landscape phone ────────────────────────────────── */
  @media (max-height: 420px) and (orientation: landscape) {
    #topbar { height: 40px; }
    #bottombar { height: 30px; }
    .dot { width: 7px; height: 7px; }
    #stage-badge { bottom: 36px; }
    body.panel-overlay #panel { top: 40px; height: calc(100% - 40px); }
  }
</style>
</head>
<body>

<div id="app">

  <!-- ── TOP BAR ─────────────────────────────────────── -->
  <header id="topbar">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-layer-group"></i></div>
      <div>
        <div class="brand-text">NCSS-IQ</div>
        <div class="brand-sub">National Credit Scoring System — Iraq</div>
      </div>
    </div>
    <div class="controls">
      <button id="btn-slides" title="All slides"><i class="fas fa-th-large"></i></button>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div class="counter" id="slide-counter">1 / 24</div>
      <button class="ctrl-btn" id="btn-first" title="First slide"><i class="fas fa-backward-step"></i></button>
      <button class="ctrl-btn" id="btn-prev2" title="Previous"><i class="fas fa-chevron-left"></i></button>
      <button class="ctrl-btn" id="btn-next2" title="Next"><i class="fas fa-chevron-right"></i></button>
      <button class="ctrl-btn" id="btn-last" title="Last slide"><i class="fas fa-forward-step"></i></button>
      <button class="ctrl-btn" id="btn-fs" title="Fullscreen"><i class="fas fa-expand"></i></button>
    </div>
  </header>

  <!-- ── MAIN ──────────────────────────────────────────── -->
  <div id="main">

    <!-- Thumbnail Panel -->
    <aside id="panel"></aside>

    <!-- Panel backdrop (mobile overlay close) -->
    <div id="panel-backdrop"></div>

    <!-- Panel toggle tab -->
    <button id="panel-toggle" title="Toggle panel"><i class="fas fa-chevron-left" id="panel-toggle-icon"></i></button>

    <!-- Stage -->
    <section id="stage">
      <div id="slide-wrapper">
        <iframe id="main-frame" src="" scrolling="no" title="Slide"></iframe>
      </div>
      <button class="nav-arrow" id="btn-prev"><i class="fas fa-chevron-left"></i></button>
      <button class="nav-arrow" id="btn-next"><i class="fas fa-chevron-right"></i></button>
      <div id="stage-badge">Slide <span id="badge-num">1</span> of <span id="badge-total">24</span></div>
      <div id="kbd-hint">
        <div class="kbd"><kbd>←</kbd><kbd>→</kbd> Navigate</div>
        <div class="kbd"><kbd>Home</kbd> First</div>
        <div class="kbd"><kbd>End</kbd> Last</div>
        <div class="kbd"><kbd>F</kbd> Fullscreen</div>
      </div>
    </section>

  </div><!-- /main -->

  <!-- ── BOTTOM BAR (dots) ──────────────────────────── -->
  <footer id="bottombar"></footer>

</div><!-- /app -->

<script>
// ── Slide definitions ──────────────────────────────────
const SLIDES = [
  { file: 'Title.html',                    title: 'Title' },
  { file: 'Vision.html',                   title: 'Vision' },
  { file: 'Strategic Solution.html',       title: 'Strategic Solution' },
  { file: 'Credit Score Model.html',       title: 'Credit Score Model' },
  { file: 'Alternative Data Inclusion.html', title: 'Alternative Data Inclusion' },
  { file: 'Credit Scoring Pipeline.htm',   title: 'Credit Scoring Pipeline' },
  { file: 'Platform Architecture.htm',     title: 'Platform Architecture' },
  { file: 'API Platform for Lenders.htm',  title: 'API Platform for Lenders' },
  { file: 'Citizen Credit Portal.htm',     title: 'Citizen Credit Portal' },
  { file: 'Fraud Prevention System.htm',   title: 'Fraud Prevention System' },
  { file: 'Security & Privacy.htm',        title: 'Security & Privacy' },
  { file: 'Hybrid Cloud Deployment.html',  title: 'Hybrid Cloud Deployment' },
  { file: 'Regulatory Oversight.htm',      title: 'Regulatory Oversight' },
  { file: 'Governance Model.html',         title: 'Governance Model' },
  { file: 'Implementation Roadmap.html',   title: 'Implementation Roadmap' },
  { file: 'Financial Model.htm',           title: 'Financial Model' },
  { file: 'Market Revenue Potential.html', title: 'Market Revenue Potential' },
  { file: 'MarketOpprtunity.html',         title: 'Market Opportunity' },
  { file: 'Economic Impact.html',          title: 'Economic Impact' },
  { file: 'Ecosystem Architecture.htm',    title: 'Ecosystem Architecture' },
  { file: 'Ecosystem Impact.html',         title: 'Ecosystem Impact' },
  { file: 'Key Benefits.html',             title: 'Key Benefits' },
  { file: 'Strategic Expansion.html',      title: 'Strategic Expansion' },
  { file: 'Closing Vision.html',           title: 'Closing Vision' },
];

// ── State ──────────────────────────────────────────────
let current = 0;
let isAnimating = false;

// ── Elements ───────────────────────────────────────────
const mainFrame      = document.getElementById('main-frame');
const slideWrapper   = document.getElementById('slide-wrapper');
const panelEl        = document.getElementById('panel');
const bottomBar      = document.getElementById('bottombar');
const slideCounter   = document.getElementById('slide-counter');
const badgeNum       = document.getElementById('badge-num');
const badgeTotal     = document.getElementById('badge-total');
const progressFill   = document.getElementById('progress-fill');
const btnPrev        = document.getElementById('btn-prev');
const btnNext        = document.getElementById('btn-next');
const btnPrev2       = document.getElementById('btn-prev2');
const btnNext2       = document.getElementById('btn-next2');
const btnFirst       = document.getElementById('btn-first');
const btnLast        = document.getElementById('btn-last');
const btnFs          = document.getElementById('btn-fs');
const panelToggle    = document.getElementById('panel-toggle');
const panelToggleIcon = document.getElementById('panel-toggle-icon');
const panelBackdrop  = document.getElementById('panel-backdrop');
const btnSlides      = document.getElementById('btn-slides');

// ── Mobile detection ───────────────────────────────────
const isMobile = () => window.innerWidth <= 768;

// ── Build thumbnails & dots ────────────────────────────
SLIDES.forEach((slide, i) => {
  // Thumbnail
  const item = document.createElement('div');
  item.className = 'thumb-item' + (i === 0 ? ' active' : '');
  item.dataset.index = i;
  item.innerHTML = `
    <div class="thumb-inner">
      <iframe src="${slide.file}" scrolling="no" loading="lazy" tabindex="-1" aria-hidden="true"></iframe>
    </div>
    <div class="thumb-overlay"></div>
    <div class="thumb-label">
      <span class="thumb-num">${i + 1}</span>
      <span class="thumb-title">${slide.title}</span>
    </div>`;
  item.addEventListener('click', () => goTo(i));
  panelEl.appendChild(item);

  // Dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.dataset.index = i;
  dot.title = `${i + 1}. ${slide.title}`;
  dot.addEventListener('click', () => goTo(i));
  if (i > 0 && i % 6 === 0) {
    const sep = document.createElement('div');
    sep.className = 'dot-sep';
    bottomBar.appendChild(sep);
  }
  bottomBar.appendChild(dot);
});

badgeTotal.textContent = SLIDES.length;

// ── Scale stage ────────────────────────────────────────
function scaleStage() {
  const stage   = document.getElementById('stage');
  const mobile  = window.innerWidth <= 480;
  const tablet  = window.innerWidth <= 768;
  const arrowPad = mobile ? 80 : tablet ? 90 : 100;
  const vertPad  = mobile ? 20 : 40;
  const sw = stage.clientWidth - arrowPad;
  const sh = stage.clientHeight - vertPad;
  const scaleX = sw / 1280;
  const scaleY = sh / 720;
  const scale  = Math.min(scaleX, scaleY);
  slideWrapper.style.width  = '1280px';
  slideWrapper.style.height = '720px';
  slideWrapper.style.transform = `scale(${scale})`;
  slideWrapper.style.setProperty('--stage-scale', String(scale));
  slideWrapper.style.transformOrigin = 'center center';
}

// ── Mobile panel overlay ───────────────────────────────
function openMobilePanel() {
  document.body.classList.add('panel-overlay');
  const activeThumb = panelEl.querySelector('.thumb-item.active');
  if (activeThumb) setTimeout(() => activeThumb.scrollIntoView({ block: 'center', behavior: 'smooth' }), 50);
}
function closeMobilePanel() {
  document.body.classList.remove('panel-overlay');
}

panelBackdrop.addEventListener('click', closeMobilePanel);
btnSlides.addEventListener('click', () => {
  if (document.body.classList.contains('panel-overlay')) {
    closeMobilePanel();
  } else {
    openMobilePanel();
  }
});

// Close overlay panel when a thumb is clicked on mobile
panelEl.addEventListener('click', () => {
  if (isMobile()) setTimeout(closeMobilePanel, 80);
});

// ── Init: auto-hide panel on mobile ───────────────────
if (isMobile()) {
  document.body.classList.add('panel-hidden');
  if (panelToggleIcon) panelToggleIcon.className = 'fas fa-chevron-right';
}

// Handle resize: switch between desktop/mobile panel modes
let lastMobile = isMobile();
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if (nowMobile !== lastMobile) {
    lastMobile = nowMobile;
    closeMobilePanel();
    if (nowMobile) {
      document.body.classList.add('panel-hidden');
    } else {
      document.body.classList.remove('panel-hidden');
      if (panelToggleIcon) panelToggleIcon.className = 'fas fa-chevron-left';
    }
    setTimeout(scaleStage, 50);
  }
});

const resizeObs = new ResizeObserver(scaleStage);
resizeObs.observe(document.getElementById('stage'));
scaleStage();

// ── Navigate ───────────────────────────────────────────
function clearTransitionClasses() {
  slideWrapper.classList.remove('trans-out-left', 'trans-out-right', 'trans-in-left', 'trans-in-right', 'fading');
}

function goTo(index, fast, direction) {
  if (index < 0 || index >= SLIDES.length) return;
  if (isAnimating && !fast) return;

  const dir = direction || (index > current ? 'next' : index < current ? 'prev' : 'next');
  const outClass = dir === 'prev' ? 'trans-out-right' : 'trans-out-left';
  const inClass = dir === 'prev' ? 'trans-in-right' : 'trans-in-left';

  const updateSlideState = () => {
    current = index;
    mainFrame.src = SLIDES[index].file;

    // Update thumbnails
    document.querySelectorAll('.thumb-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
    // Scroll active thumb into view
    const activeThumb = panelEl.querySelector('.thumb-item.active');
    if (activeThumb) activeThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    // Update dots
    document.querySelectorAll('.dot').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });

    // Update counter / badge / progress
    slideCounter.textContent = `${index + 1} / ${SLIDES.length}`;
    badgeNum.textContent     = index + 1;
    progressFill.style.width = `${((index + 1) / SLIDES.length) * 100}%`;

    // Update arrow states
    btnPrev.disabled  = index === 0;
    btnNext.disabled  = index === SLIDES.length - 1;
    btnPrev2.disabled = index === 0;
    btnNext2.disabled = index === SLIDES.length - 1;

  };

  if (fast) {
    clearTransitionClasses();
    updateSlideState();
    return;
  }

  isAnimating = true;
  clearTransitionClasses();
  slideWrapper.classList.add(outClass);

  setTimeout(() => {
    clearTransitionClasses();
    updateSlideState();
    slideWrapper.classList.add(inClass);

    const finishIn = () => {
      clearTransitionClasses();
      isAnimating = false;
    };

    mainFrame.addEventListener('load', finishIn, { once: true });
    setTimeout(finishIn, 360);
  }, 230);
}

// Initial load
goTo(0, true);

// ── Button events ──────────────────────────────────────
btnPrev.addEventListener('click',  () => goTo(current - 1));
btnNext.addEventListener('click',  () => goTo(current + 1));
btnPrev2.addEventListener('click', () => goTo(current - 1));
btnNext2.addEventListener('click', () => goTo(current + 1));
btnFirst.addEventListener('click', () => goTo(0));
btnLast.addEventListener('click',  () => goTo(SLIDES.length - 1));

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch (e.key) {
    case 'ArrowLeft':  case 'ArrowUp':    case 'PageUp':   goTo(current - 1); break;
    case 'ArrowRight': case 'ArrowDown':  case 'PageDown': goTo(current + 1); break;
    case 'Home': goTo(0); break;
    case 'End':  goTo(SLIDES.length - 1); break;
    case 'f': case 'F': toggleFullscreen(); break;
  }
});

// ── Fullscreen ─────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    btnFs.innerHTML = '<i class="fas fa-compress"></i>';
  } else {
    document.exitFullscreen();
    btnFs.innerHTML = '<i class="fas fa-expand"></i>';
  }
}
btnFs.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    btnFs.innerHTML = '<i class="fas fa-expand"></i>';
  }
});

// ── Panel toggle (desktop) ────────────────────────────
panelToggle.addEventListener('click', () => {
  if (isMobile()) return; // mobile uses overlay mode
  document.body.classList.toggle('panel-hidden');
  const hidden = document.body.classList.contains('panel-hidden');
  panelToggleIcon.className = hidden ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
  panelToggle.title = hidden ? 'Show panel' : 'Hide panel';
  setTimeout(scaleStage, 260);
});

// ── Touch / swipe ──────────────────────────────────────
let touchStartX = 0;
let touchStartY = 0;
document.getElementById('stage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  // Only trigger horizontal swipes (ignore scrolling gestures)
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx < 0 ? goTo(current + 1) : goTo(current - 1);
  }
}, { passive: true });

// Swipe on whole document for mobile (when panel not open)
document.addEventListener('touchstart', e => {
  if (!document.body.classList.contains('panel-overlay')) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, { passive: true });
</script>
